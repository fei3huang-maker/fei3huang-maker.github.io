<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本填充工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-section {
            margin-bottom: 30px;
        }
        
        .upload-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-input-label {
            display: block;
            padding: 12px 20px;
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }
        
        .file-input-label:hover {
            background: #e8e8ff;
            border-color: #764ba2;
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        
        .file-name.success {
            color: #27ae60;
        }
        
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-size: 13px;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d5f4e6;
            color: #27ae60;
            border: 1px solid #27ae60;
        }
        
        .status.error {
            background: #fadbd8;
            color: #c0392b;
            border: 1px solid #c0392b;
        }
        
        .status.info {
            background: #d6eaf8;
            color: #2980b9;
            border: 1px solid #2980b9;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-process {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-process:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-process:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: #ecf0f1;
            color: #333;
        }
        
        .btn-reset:hover {
            background: #d5dbdb;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar.show {
            display: block;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            display: none;
            font-size: 13px;
        }
        
        .stats.show {
            display: block;
        }
        
        .stat-item {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .stat-label {
            color: #666;
            font-weight: 600;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: 700;
        }
        
        .info-box {
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .info-box strong {
            display: block;
            margin-bottom: 4px;
        }
        
        .badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 成本填充工具</h1>
        <p class="subtitle">从 SharePoint 自动填充多年份成本数据</p>
        
        <div class="info-box">
            <strong>✨ 功能说明：</strong>
            • 自动从 SharePoint 读取最新数据库<br>
            • 支持多年份（2026、2027、2028）同时填充<br>
            • 上传文件 B 自动匹配零件号并填充<br>
            • 下载完整的成本数据文件
            <span class="badge">SharePoint 集成</span>
        </div>
        
        <div class="upload-section">
            <div class="upload-group">
                <label>📁 数据库状态（SharePoint List）</label>
                <div id="dbStatus" class="status info show">
                    ⏳ 正在加载 SharePoint 数据...
                </div>
                <div id="dbInfo" style="display: none; margin-top: 10px; padding: 12px; background: #f0f0f0; border-radius: 6px; font-size: 12px;">
                    <div><strong>零件号数量：</strong> <span id="dbPartCount">0</span></div>
                    <div><strong>年份数据：</strong> <span id="dbYears">加载中...</span></div>
                </div>
            </div>
            
            <div class="upload-group">
                <label for="dataFile">📄 数据文件 B (Excel)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="dataFile" accept=".xlsx,.xls,.csv">
                    <label for="dataFile" class="file-input-label">
                        点击选择或拖拽文件（需要填充成本）
                    </label>
                </div>
                <div class="file-name" id="dataFileName"></div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-process" id="processBtn" disabled>🚀 开始处理</button>
            <button class="btn-reset" id="resetBtn">↻ 重置</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <span class="stat-label">处理行数：</span>
                <span class="stat-value" id="totalRows">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">成功匹配：</span>
                <span class="stat-value" id="matchedCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">未匹配项：</span>
                <span class="stat-value" id="unmatchedCount">0</span>
            </div>
        </div>
    </div>

    <script>
        let dbData = null;
        let dataToProcess = null;
        const SHAREPOINT_LIST_URL = 'https://trw1.sharepoint.com/:l:/r/sites/A2Auto-BOM_CostEstimation/Lists/DatabaseTest?e=03dDBH';

        // 从 SharePoint List 加载数据
        const loadSharePointData = async () => {
            try {
                showStatus('正在从 SharePoint 加载数据...', 'loading');
                
                // 方案：使用 SharePoint REST API 或导出功能
                // 这里我们尝试通过 OData 接口获取数据
                const siteUrl = 'https://trw1.sharepoint.com/sites/A2Auto-BOM_CostEstimation';
                const listName = 'DatabaseTest';
                
                // 尝试从 SharePoint 获取数据
                const response = await fetch(
                    `${siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=5000`,
                    {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        credentials: 'include'
                    }
                );

                if (response.ok) {
                    const data = await response.json();
                    processSharePointResponse(data.value);
                } else {
                    // 如果 API 调用失败，使用替代方案
                    showStatus('⚠️ 无法直接从 SharePoint API 读取。请使用替代方法：复制 List 数据到 Excel 文件 A', 'info');
                    document.getElementById('dbInfo').style.display = 'none';
                }
            } catch (error) {
                console.error('SharePoint 加载失败:', error);
                showStatus('提示：无法自动连接 SharePoint。请先下载 Excel 文件 A 再上传。', 'info');
            }
        };

        const processSharePointResponse = (items) => {
            try {
                // 转换 SharePoint 数据格式
                dbData = items.map(item => {
                    const obj = {
                        'Part number': item.Title || item.PartNumber || ''
                    };
                    // 添加年份列
                    if (item['2026']) obj['2026'] = item['2026'];
                    if (item['2027']) obj['2027'] = item['2027'];
                    if (item['2028']) obj['2028'] = item['2028'];
                    return obj;
                });

                if (dbData.length === 0) {
                    showStatus('SharePoint List 为空', 'error');
                    return;
                }

                // 显示数据库信息
                displayDatabaseInfo();
                showStatus('✓ SharePoint 数据加载成功！', 'success');
                updateProcessButton();
            } catch (error) {
                console.error('处理 SharePoint 数据失败:', error);
                showStatus('处理数据失败，请重试', 'error');
            }
        };

        const displayDatabaseInfo = () => {
            if (!dbData) return;
            
            const info = document.getElementById('dbInfo');
            document.getElementById('dbStatus').style.display = 'none';
            info.style.display = 'block';
            
            // 统计零件号
            document.getElementById('dbPartCount').textContent = dbData.length;
            
            // 获取年份列
            const years = Object.keys(dbData[0])
                .filter(key => key !== 'Part number' && !isNaN(key))
                .sort()
                .join('、');
            document.getElementById('dbYears').textContent = years || '无';
        };

        // 文件拖拽处理
        const setupDragAndDrop = (inputId, displayId) => {
            const fileInput = document.getElementById(inputId);
            const label = fileInput.nextElementSibling;

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                label.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                label.addEventListener(eventName, () => {
                    label.style.background = '#e8e8ff';
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                label.addEventListener(eventName, () => {
                    label.style.background = '#f0f0f0';
                }, false);
            });

            label.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                fileInput.files = files;
                handleFileSelect({ target: { files: files } }, displayId);
            }, false);

            fileInput.addEventListener('change', (e) => handleFileSelect(e, displayId));
        };

        const handleFileSelect = (e, displayId) => {
            const file = e.target.files[0];
            if (!file) return;

            const fileName = file.name;
            const display = document.getElementById(displayId);
            display.textContent = `✓ ${fileName}`;
            display.classList.add('success');

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(worksheet);

                    if (json.length === 0) {
                        showStatus(`文件 ${fileName} 为空`, 'error');
                        return;
                    }

                    dataToProcess = json;
                    updateProcessButton();
                } catch (error) {
                    showStatus(`读取文件 ${fileName} 失败: ${error.message}`, 'error');
                    display.textContent = '✗ 读取失败，请重试';
                    display.classList.remove('success');
                }
            };
            reader.readAsArrayBuffer(file);
        };

        const updateProcessButton = () => {
            const btn = document.getElementById('processBtn');
            btn.disabled = !(dbData && dataToProcess);
        };

        const showStatus = (message, type = 'info') => {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
        };

        const processData = () => {
            if (!dbData || !dataToProcess) {
                showStatus('请先加载数据库和上传文件 B', 'error');
                return;
            }

            try {
                showStatus('处理中...', 'info');
                document.getElementById('progressBar').classList.add('show');

                // 获取文件 B 的列名
                const dataColumns = Object.keys(dataToProcess[0] || {});
                const partCol = dataColumns.find(c => c === 'Part number' || c.toLowerCase().includes('part'));
                
                if (!partCol) {
                    showStatus('无法找到文件 B 中的"Part number"列', 'error');
                    return;
                }

                // 获取年份列（2026、2027、2028 等）
                const yearColumns = dataColumns.filter(col => !isNaN(col) && col !== '');
                
                if (yearColumns.length === 0) {
                    showStatus('无法找到文件 B 中的年份列（如 2026、2027、2028）', 'error');
                    return;
                }

                // 创建成本映射表
                const costMap = {};
                dbData.forEach(row => {
                    const partNumber = String(row['Part number']).trim();
                    if (partNumber) {
                        costMap[partNumber] = {};
                        yearColumns.forEach(year => {
                            costMap[partNumber][year] = row[year];
                        });
                    }
                });

                let matchedCount = 0;
                let unmatchedCount = 0;
                const totalRows = dataToProcess.length;

                dataToProcess.forEach((row, index) => {
                    const progress = ((index + 1) / totalRows) * 100;
                    document.getElementById('progressFill').style.width = progress + '%';

                    const partNumber = String(row[partCol]).trim();
                    if (costMap[partNumber]) {
                        // 填充所有年份的数据
                        yearColumns.forEach(year => {
                            if (costMap[partNumber][year] !== undefined) {
                                row[year] = costMap[partNumber][year];
                            }
                        });
                        matchedCount++;
                    } else {
                        unmatchedCount++;
                    }
                });

                // 更新统计
                document.getElementById('totalRows').textContent = totalRows;
                document.getElementById('matchedCount').textContent = matchedCount;
                document.getElementById('unmatchedCount').textContent = unmatchedCount;
                document.getElementById('stats').classList.add('show');

                // 生成 Excel 文件
                const newWorkbook = XLSX.utils.book_new();
                const newWorksheet = XLSX.utils.json_to_sheet(dataToProcess);
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, 'Sheet1');

                const fileName = `成本填充结果_${new Date().getTime()}.xlsx`;
                XLSX.writeFile(newWorkbook, fileName);

                showStatus(`✓ 处理成功！已填充 ${matchedCount} 条记录，${unmatchedCount} 条未匹配。文件已自动下载。`, 'success');
                document.getElementById('progressFill').style.width = '100%';

            } catch (error) {
                showStatus(`处理出错: ${error.message}`, 'error');
                console.error(error);
            }
        };

        const reset = () => {
            dataToProcess = null;
            document.getElementById('dataFile').value = '';
            document.getElementById('dataFileName').textContent = '';
            document.getElementById('dataFileName').classList.remove('success');
            document.getElementById('status').classList.remove('show');
            document.getElementById('progressBar').classList.remove('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('stats').classList.remove('show');
            updateProcessButton();
        };

        // 事件监听
        document.getElementById('processBtn').addEventListener('click', processData);
        document.getElementById('resetBtn').addEventListener('click', reset);

        setupDragAndDrop('dataFile', 'dataFileName');

        // 页面加载时自动加载 SharePoint 数据
        window.addEventListener('load', () => {
            loadSharePointData();
        });
    </script>
</body>
</html>
